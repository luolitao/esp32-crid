name: ESP32 Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6  # ✅ 升级: v4 → v6 (支持 Node.js 24) [[1]]
      with:
        submodules: 'recursive'

    - name: Set up Python
      uses: actions/setup-python@v6  # ✅ 升级: v5 → v6 (支持 Node.js 24) [[13]]
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install setuptools wheel

    - name: ESP-IDF Build
      uses: espressif/esp-idf-ci-action@v1  # ✅ 此 action 通过 Docker 运行，不受 Node 版本影响 [[22]]
      with:
        esp_idf_version: v5.2.1
        target: esp32
        path: 'main_rx'
        command: idf.py build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4  # ✅ v4 已支持 Node 24，无需升级
      with:
        name: esp32-firmware
        path: |
          build/*.bin
          build/*.elf
          build/bootloader/*.bin
          build/partition_table/*.bin

    # 自动发布 Release
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2  # ✅ 建议使用最新版
      with:
        files: |
          build/*.bin
          build/bootloader/*.bin
          build/partition_table/*.bin
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}